<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>


    <!-- font family-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS Latest CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- custom css -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- fav -->
    <link rel="shortcut icon" href="./assets/img/logo/fav-icon.png" type="image/x-icon">
</head>

<section class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div
        class="bg-white w-full max-w-[520px] rounded-2xl shadow-[0_5px_10px_0_rgba(0,0,0,0.08)] border border-gray-100 p-8 flex flex-col items-center">

        <div class="mb-6">
            <img src="./assets/img/logo/git-logo.png" alt="GitHub Logo" class="w-24 h-24">
        </div>

        <h1 class="text-3xl font-bold text-[#2D3748] mb-2">GitHub Issues Tracker</h1>
        <p class="text-gray-500 text-lg mb-4">Sign in to manage your issues</p>

        <div class="w-full space-y-6">
            <div class="space-y-1">
                <label class="block text-lg font-semibold text-[#2D3748]">Username</label>
                <input type="text" placeholder="Enter Username"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder:text-gray-400">
                <p class="text-[#6366F1] text-sm">Default: admin</p>
            </div>

            <div class="space-y-1">
                <label class="block text-lg font-semibold text-[#2D3748]">Password</label>
                <input type="password" placeholder="Enter Password"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder:text-gray-400">
                <p class="text-[#6366F1] text-sm">Default: admin123</p>
            </div>

            <button
                class="w-full bg-[#4A00FF] hover:bg-[#4300D9] text-white font-bold py-3 rounded-xl transition-all text-lg mt-4">
                Sign In
            </button>
        </div>

        <div class="relative w-full flex items-center justify-center my-5">
            <hr class="w-full border-gray-200">
            <span class="absolute bg-white px-4 text-gray-500 font-medium">OR</span>
        </div>

        <p class="text-gray-500 mb-2">Demo Credentials:</p>
        <div class="w-full bg-[#F7F9FC] rounded-2xl p-4 text-center">
            <div class="text-[#2D3748] text-lg">
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>
</section>
<script src="./assets/js/main.js"></script>

<body>

</body>

</html>
