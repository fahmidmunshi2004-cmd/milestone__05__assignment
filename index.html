<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>


    <!-- font family-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS Latest CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- custom css -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- fav -->
    <link rel="shortcut icon" href="./assets/img/logo/fav-icon.png" type="image/x-icon">


</head>

<body>
    <header class="header-area bg-white">
        <div class="max-w-[1450px] mx-auto flex items-center justify-between py-[14px]">
            <div class="logo">
                <a href="#">
                    <img src="./assets/img/logo/main-logo.png" alt="">
                </a>
            </div>
            <div class="right flex items-center gap-4">
                <div class="search flex items-center gap-4">
                    <input type="text" placeholder="Search issues..."
                        class="w-[300px] px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder:text-gray-400">
                    <button
                        class="w-full bg-[#4A00FF] hover:bg-[#4300D9] text-white font-bold py-3 rounded-xl transition-all text-lg">
                        Search
                    </button>
                </div>
            </div>
        </div>
    </header>

</body>

</html>
